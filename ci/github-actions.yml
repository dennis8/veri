# GitHub Actions template for Veri CI sharding
# Save as .github/workflows/test.yml in your repository

name: Test with Veri

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Generate sharding manifest
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-shards.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov
      
      - name: Install veri
        run: uv tool install veri
      
      - name: Generate test shards
        id: generate-shards
        run: |
          veri split --ci 4 > shards.json
          echo "matrix=$(cat shards.json | jq -c .shards | jq -c 'map({shard_id, test_count, estimated_duration})')" >> $GITHUB_OUTPUT
      
      - name: Upload shards manifest
        uses: actions/upload-artifact@v4
        with:
          name: test-shards
          path: shards.json
          retention-days: 1

  # Run tests in parallel shards
  test:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    name: "Test Shard ${{ matrix.shard.shard_id }} (${{ matrix.shard.test_count }} tests)"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Restore veri cache
        uses: actions/cache@v4
        with:
          path: .veri/cache
          key: veri-cache-${{ runner.os }}-py3.11-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            veri-cache-${{ runner.os }}-py3.11-
            veri-cache-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov
      
      - name: Install veri
        run: uv tool install veri
      
      - name: Download shards manifest
        uses: actions/download-artifact@v4
        with:
          name: test-shards
      
      - name: Run tests for shard
        run: |
          mkdir -p reports
          veri shard --ci ${{ matrix.shard.shard_id }} --manifest shards.json \
            --junit-xml reports/junit-shard-${{ matrix.shard.shard_id }}.xml \
            --jsonl reports/events-shard-${{ matrix.shard.shard_id }}.jsonl \
            --cov --cov-merge-full
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-shard-${{ matrix.shard.shard_id }}
          path: |
            reports/junit-shard-${{ matrix.shard.shard_id }}.xml
            reports/events-shard-${{ matrix.shard.shard_id }}.jsonl
          retention-days: 7
      
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-shard-${{ matrix.shard.shard_id }}
          path: |
            reports/coverage*.xml
            .veri/cache/coverage*.json
          retention-days: 7
      
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (Shard ${{ matrix.shard.shard_id }})
          path: reports/junit-shard-${{ matrix.shard.shard_id }}.xml
          reporter: java-junit

  # Merge coverage reports
  coverage:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install coverage
      
      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: coverage-data/
          merge-multiple: true
      
      - name: Merge coverage reports
        run: |
          mkdir -p reports
          # Use veri's fast coverage combiner if available, fallback to coverage.py
          if command -v veri &> /dev/null; then
            veri --cov-merge-full coverage-data/*.xml > reports/coverage.xml
          else
            coverage combine coverage-data/.coverage.*
            coverage xml -o reports/coverage.xml
          fi
      
      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: reports/coverage.xml
          retention-days: 30
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: reports/coverage.xml
          fail_ci_if_error: true
