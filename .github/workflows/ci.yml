name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          pip install uv

      - name: Build (Rust)
        run: cargo build --workspace --locked

      - name: Test (Rust)
        run: cargo test --workspace --locked

      - name: Test (py_worker)
        run: |
          cd py_worker
          uv sync --dev
          uv run pytest -q

      - name: Symlink dev binary (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p .bin
          ln -sf ../target/debug/veri-cli .bin/veri

      - name: Symlink dev binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir .bin
          copy target\debug\veri-cli.exe .bin\veri.exe

      - name: Multi-worker smoke
        env:
          VERI_DISABLE_ALLOWLIST: '1'
        run: |
          python - << 'PY'
import os, subprocess, tempfile, sys
from pathlib import Path
repo = Path.cwd()
env = os.environ.copy()
env["PATH"] = str(repo/".bin") + os.pathsep + env.get("PATH", "")
tmp = tempfile.TemporaryDirectory()
+d = Path(tmp.name)
+(d/"test_ok.py").write_text("def test_ok():\n    assert 1+1==2\n")
cmd = ["veri", "--disable-allowlist", "--workers", "2", "-v"]
print('Running:', ' '.join(cmd))
+p = subprocess.run(cmd, cwd=d, env=env, capture_output=True, text=True)
print(p.stdout)
print(p.stderr, file=sys.stderr)
sys.exit(0 if p.returncode in (0,1) else p.returncode)
PY
